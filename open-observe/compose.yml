# OpenObserve: centralized log aggregation for Homebase/ODIN identity hosts.
#
# The log host (Hetzner CCX12, hel1) already runs an INDEPENDENT Caddy container serving other sites, so
# this stack does NOT bundle Caddy (a second one would collide on 80/443). OpenObserve joins that Caddy's
# Docker network, and you add one site block to the host's existing Caddyfile (see Caddyfile.snippet).
# Ansible renders this file + a 0600 `.env` (from the vault) and brings it up with docker_compose_v2.
# See PLAN.md. Every ${VAR} comes from that .env. NO secrets live in this file.
services:
  openobserve:
    container_name: openobserve   # stable upstream for the host's Caddy: reverse_proxy h2c://openobserve:5081
    restart: unless-stopped
    # Pin a concrete version in production; do NOT float :latest. OSS / AGPL build (not enterprise).
    image: public.ecr.aws/zinclabs/openobserve:${OPENOBSERVE_VERSION:?set OPENOBSERVE_VERSION in .env}
    # Hard memory ceiling; must exceed the sum of the cache sizes + memtable + overhead or the container
    # is OOM-killed. Default sized for an ~8 GB host.
    mem_limit: "${OO_MEM_LIMIT:-6g}"
    environment:
      ZO_ROOT_USER_EMAIL: "${OO_ROOT_USER_EMAIL:?}"
      ZO_ROOT_USER_PASSWORD: "${OO_ROOT_USER_PASSWORD:?}"
      ZO_DATA_DIR: "/data"
      ZO_COMPACT_DATA_RETENTION_DAYS: "${OO_RETENTION_DAYS:-30}"   # prune logs older than N days; compactor enforces
      # Data backend = Hetzner S3 (hel1). ZO_LOCAL_MODE left UNSET (stays local/single-node); only data → S3.
      # Metadata stays SQLite on the oo-data volume — BACK IT UP (see PLAN.md §8).
      ZO_LOCAL_MODE_STORAGE: "s3"
      ZO_S3_PROVIDER: "minio"                                       # generic S3-compatible; Hetzner isn't a named provider
      ZO_S3_SERVER_URL: "${ZO_S3_SERVER_URL:?}"
      ZO_S3_REGION_NAME: "${ZO_S3_REGION_NAME:?}"
      ZO_S3_BUCKET_NAME: "${ZO_S3_BUCKET_NAME:?}"
      ZO_S3_ACCESS_KEY: "${ZO_S3_ACCESS_KEY:?}"
      ZO_S3_SECRET_KEY: "${ZO_S3_SECRET_KEY:?}"
      ZO_S3_FEATURE_FORCE_PATH_STYLE: "${ZO_S3_FORCE_PATH_STYLE:-false}"  # Hetzner uses virtual-hosted style
      # Memory bounds (single-node; the two in-memory caches each default to ~50% RAM — pin them).
      ZO_DISK_CACHE_MAX_SIZE: "${ZO_DISK_CACHE_MAX_SIZE:-10240}"          # MB; local read-cache (disk, not RAM)
      ZO_MEMORY_CACHE_MAX_SIZE: "${OO_MEM_CACHE_MAX_SIZE:-2048}"          # MB; query-result cache
      ZO_MEMORY_CACHE_DATAFUSION_MAX_SIZE: "${OO_DATAFUSION_CACHE_MAX_SIZE:-2048}"  # MB; query engine working set
      ZO_FILE_MOVE_THREAD_NUM: "${OO_FILE_MOVE_THREAD_NUM:-1}"            # compaction threads (default cores x2); 1 suits 2 vCPU
    ports:
      - "127.0.0.1:5080:5080"   # Web UI — loopback ONLY; reach via SSH tunnel (see PLAN.md "UI access").
      # 5081 (OTLP gRPC) is NOT host-published. The host's existing Caddy reaches it over the shared
      # `proxy` network as openobserve:5081, terminates the real TLS at the edge, and forwards h2c.
    volumes:
      - oo-data:/data           # SQLite metadata + WAL + read cache (Parquet data goes to S3) — BACK UP the metadata
    networks:
      - proxy

networks:
  # The Docker network the host's EXISTING Caddy is attached to. `external: true` = pre-existing (this
  # compose does not create it). Set the name to your Caddy's actual network; both containers must share
  # it so Caddy can resolve `openobserve`. If your Caddy isn't on a shared network yet, create one
  # (`docker network create proxy`) and attach Caddy to it.
  proxy:
    external: true

volumes:
  oo-data:
