services:
  postgres-dev:
    restart: unless-stopped
    image: postgres:16
    environment:
      POSTGRES_DB: homebase_dev
      POSTGRES_USER: homebase_dev
      POSTGRES_PASSWORD: homebase_dev
    ports:
      - "54320:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data

  redis-dev:
    restart: unless-stopped
    image: redis:7
    ports:
      - "63790:6379"

volumes:
  pgdata-dev:
  