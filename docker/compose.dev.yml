services:
  postgres-dev:
    restart: unless-stopped
    image: postgres:16
    environment:
      POSTGRES_DB: homebase_dev
      POSTGRES_USER: homebase_dev
      POSTGRES_PASSWORD: homebase_dev
    ports:
      - "54320:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data

  redis-dev:
    restart: unless-stopped
    image: redis:7
    ports:
      - "63790:6379"

  minio-dev:
    restart: unless-stopped
    image: minio/minio:RELEASE.2025-05-24T17-08-30Z   # same tag the tests pin
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console at http://localhost:9001
    volumes:
       - miniodata-dev:/data      

volumes:
  pgdata-dev:
  miniodata-dev:

  